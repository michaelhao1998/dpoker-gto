/** Seeded shuffle using provided rng function - partial shuffle optimization */
function seededShuffle(arr, rng, count) {
  // Only shuffle 'count' elements if specified (partial Fisher-Yates)
  const n = count ? Math.min(count, arr.length) : arr.length;
  for (let i = 0; i < n; i++) {
    const j = i + Math.floor(rng() * (arr.length - i));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/**
 * Monte Carlo equity with seeded PRNG for stable results.
 * Runs on main thread (Web Worker would require separate file or complex Blob).
 * Optimized: 3000 iterations is fast enough (<200ms) for 7-card eval.
 */
/** Build opponent range filter based on game context */
function buildOppRangeFilter() {
  const facing = state.facingAction;
  const street = state.street;
  // Only filter on preflop and early postflop (opponent entered pot somehow)
  if (street !== 'preflop' && street !== 'flop') return null;

  // Rough top-N% hand check using rank sum heuristic
  // Lower rankSum = stronger hand (AA=0, 72o=22)
  let maxRankSum = 24; // default: accept all
  if (facing === 'vs3bet' || facing === 'vs4bet') maxRankSum = 8;    // ~top 8% (premium)
  else if (facing === 'vsor') maxRankSum = 14;                        // ~top 25%
  else if (facing === 'vsai') maxRankSum = 6;                         // ~top 5%
  else if (['open','open2','open25','open3'].includes(facing)) maxRankSum = 16; // ~top 35% (blinds)
  else if (facing === 'vslimp_bp') maxRankSum = 18;                   // ~top 45%

  if (maxRankSum >= 24) return null; // no filter needed

  return function(oppHand) {
    const ri = RANKS.indexOf(oppHand[0][0]);
    const rj = RANKS.indexOf(oppHand[1][0]);
    const suited = oppHand[0][1] === oppHand[1][1];
    const isPair = ri === rj;
    let rankSum = ri + rj;
    if (isPair) rankSum -= 3;      // pairs are stronger
    if (suited) rankSum -= 2;      // suited bonus
    return rankSum <= maxRankSum;
  };
}

function calculateEquity(heroCards, boardCards, opponentCount, simulations) {
  const oppCount = Math.max(1, opponentCount);
  
  // Multiway pot: use specialized calculation
  if (oppCount >= 3) {
    return calculateMultiwayEquity(heroCards, boardCards, oppCount, simulations);
  }
  
  const N = simulations || 500;
  const usedCards = new Set([...heroCards, ...boardCards]);
  const deck = [];
  for (const s of SUITS) {
    for (const r of RANKS) {
      const key = r + s;
      if (!usedCards.has(key)) deck.push(key);
    }
  }

  const boardNeeded = 5 - boardCards.length;
  const cardsNeeded = boardNeeded + oppCount * 2; // Only shuffle what we need
  const seed = hashCards(heroCards, boardCards);
  const rng = mulberry32(seed);

  // Opponent range filter
  const oppRangeFilter = buildOppRangeFilter();

  // Pre-allocate arrays to reduce GC pressure
  const fullBoard = new Array(5);
  for (let i = 0; i < boardCards.length; i++) fullBoard[i] = boardCards[i];
  const heroHand = new Array(7);
  heroHand[0] = heroCards[0];
  heroHand[1] = heroCards[1];

  let wins = 0, ties = 0, validSims = 0;
  for (let sim = 0; sim < N * 2 && validSims < N; sim++) {
    // Partial shuffle - only shuffle the cards we need
    seededShuffle(deck, rng, cardsNeeded);
    
    // Fill board
    for (let i = 0; i < boardNeeded; i++) fullBoard[boardCards.length + i] = deck[i];
    let offset = boardNeeded;

    // Check if opponent hands pass range filter
    let validOpp = true;
    for (let opp = 0; opp < oppCount; opp++) {
      const oh = [deck[offset], deck[offset+1]];
      offset += 2;
      if (oppRangeFilter && !oppRangeFilter(oh)) { validOpp = false; break; }
    }
    if (!validOpp) continue;
    validSims++;

    offset = boardNeeded;
    // Reuse heroHand array
    for (let i = 0; i < 5; i++) heroHand[2 + i] = fullBoard[i];
    const heroScore = evaluate7(heroHand);
    
    let heroBest = true, tieCount = 0;
    const oppHand7 = new Array(7);
    for (let opp = 0; opp < oppCount; opp++) {
      oppHand7[0] = deck[offset];
      oppHand7[1] = deck[offset+1];
      for (let i = 0; i < 5; i++) oppHand7[2 + i] = fullBoard[i];
      offset += 2;
      const oppScore = evaluate7(oppHand7);
      if (oppScore > heroScore) { heroBest = false; break; }
      if (oppScore === heroScore) tieCount++;
    }
    if (heroBest && tieCount === 0) wins++;
    else if (heroBest && tieCount > 0) ties++;
  }
  if (validSims === 0) validSims = 1;
  return Math.round((wins + ties * 0.5) / validSims * 1000) / 10;
}

/**
 * Calculate equity in multiway pots (3+ players)
 * Uses importance sampling for better convergence with multiple opponents
 */
function calculateMultiwayEquity(heroCards, boardCards, oppCount, simulations) {
  const N = simulations || 2000; // Reduced for multiway complexity
  const usedCards = new Set([...heroCards, ...boardCards]);
  const deck = [];
  for (const s of SUITS) {
    for (const r of RANKS) {
      const key = r + s;
      if (!usedCards.has(key)) deck.push(key);
    }
  }

  const boardNeeded = 5 - boardCards.length;
  const seed = hashCards(heroCards, boardCards);
  const rng = mulberry32(seed);
  
  // Get opponent ranges based on simulated positions
  const oppRanges = [];
  const positions = ['BTN', 'CO', 'HJ', 'UTG', 'SB', 'BB'];
  for (let i = 0; i < oppCount; i++) {
    const pos = positions[i % positions.length];
    oppRanges.push(getOpponentRange(pos, 'open'));
  }

  let wins = 0, ties = 0, validSims = 0;
  let totalPotEquity = 0;
  
  for (let sim = 0; sim < N * 3 && validSims < N; sim++) {
    seededShuffle(deck, rng);
    const fullBoard = [...boardCards, ...deck.slice(0, boardNeeded)];
    let offset = boardNeeded;

    // Deal opponent hands from their respective ranges
    const oppHands = [];
    let validSim = true;
    
    for (let opp = 0; opp < oppCount; opp++) {
      const oh = [deck[offset], deck[offset+1]];
      offset += 2;
      
      // Range check
      const range = oppRanges[opp];
      if (range && range.hands) {
        const ohKey = makeHandKey(oh[0], oh[1]);
        if (!range.hands.includes(ohKey) && rng() > 0.2) {
          validSim = false;
          break;
        }
      }
      oppHands.push(oh);
    }
    
    if (!validSim) continue;
    validSims++;

    const heroScore = evaluate7([...heroCards, ...fullBoard]);
    
    // Find best opponent score
    let bestOppScore = 0;
    let heroRank = 1;
    let tieCount = 0;
    
    for (const oppHand of oppHands) {
      const oppScore = evaluate7([...oppHand, ...fullBoard]);
      if (oppScore > heroScore) {
        heroRank++;
      } else if (oppScore === heroScore) {
        tieCount++;
      }
      bestOppScore = Math.max(bestOppScore, oppScore);
    }

    // Calculate pot equity share
    if (heroRank === 1) {
      if (tieCount === 0) {
        wins++;
        totalPotEquity += 1.0;
      } else {
        ties++;
        totalPotEquity += 1.0 / (tieCount + 1);
      }
    } else if (heroScore === bestOppScore) {
      totalPotEquity += 1.0 / (tieCount + 1);
    }
  }
  
  if (validSims === 0) validSims = 1;
  
  // Return expected pot equity (more accurate for multiway)
  const winPct = Math.round((wins + ties * 0.5) / validSims * 1000) / 10;
  const potEquity = Math.round(totalPotEquity / validSims * 1000) / 10;
  
  return potEquity;
}

// ============================================================
// BOARD ANALYSIS (FIX P2: monotone definition)
// ============================================================

function analyzeBoard(board) {
  if (board.length === 0) return { wetness:0, type:'none', paired:false, monotone:false, connected:false, highCards:0, flushDraw:false, madeFlush:false };

  const ranks = board.map(c => RANKS.indexOf(c[0]));
  const vals = board.map(c => rankValue(c[0]));
  const suits = board.map(c => c[1]);

  const suitCount = {};
  suits.forEach(s => suitCount[s] = (suitCount[s]||0)+1);
  const maxSuit = Math.max(...Object.values(suitCount));

  // FIX: monotone = ALL board cards same suit (3/3 flop, 4/4 turn, 5/5 river)
  const monotone = maxSuit === board.length && board.length >= 3;
  // Flush draw: 3 of same suit on flop (possible flush), or 4 of same on turn
  const flushDraw = maxSuit >= 3 && !monotone;
  // Made flush possible if 4+ same suit on board
  const madeFlush = maxSuit >= 4;

  const uniqueRanks = new Set(ranks).size;
  const paired = uniqueRanks < board.length;

  const sorted = [...vals].sort((a,b)=>a-b);
  let maxConsec = 1, cur = 1;
  for (let i = 1; i < sorted.length; i++) {
    if (sorted[i] - sorted[i-1] === 1) { cur++; maxConsec = Math.max(maxConsec, cur); }
    else if (sorted[i] !== sorted[i-1]) cur = 1;
  }
  const connected = maxConsec >= 3;
  const highCards = ranks.filter(r => r <= 4).length;

  let wetness = 0;
  if (monotone) wetness += 0.35;
  else if (flushDraw) wetness += 0.22;
  if (madeFlush) wetness += 0.10;
  wetness += connected ? 0.25 : (maxConsec >= 2 ? 0.12 : 0);
  wetness += paired ? 0.10 : 0;
  wetness += highCards * 0.05;
  wetness = Math.min(1, wetness);

  return { wetness, type: wetness>0.5?'wet':(wetness>0.25?'medium':'dry'), paired, monotone, connected, highCards, flushDraw, madeFlush };
}

// ============================================================
// DRAW DETECTION (FIX P1: verify hero participation + wheel)
// ============================================================

function detectDraws(heroCards, boardCards) {
  const allCards = [...heroCards, ...boardCards];
  const allVals = allCards.map(c => rankValue(c[0]));
  const allSuits = allCards.map(c => c[1]);
  const heroVals = heroCards.map(c => rankValue(c[0]));
  const heroSuits = heroCards.map(c => c[1]);
  const boardVals = boardCards.map(c => rankValue(c[0]));
  const boardSuits = boardCards.map(c => c[1]);

  // Flush draw: hero must contribute at least 1 card to the flush suit
  const suitCount = {};
  allSuits.forEach(s => suitCount[s] = (suitCount[s]||0)+1);
  let flushDraw = false, madeFlush = false;
  for (const s in suitCount) {
    const heroInSuit = heroSuits.filter(hs => hs === s).length;
    const boardInSuit = boardSuits.filter(bs => bs === s).length;
    if (heroInSuit >= 1) {
      if (suitCount[s] >= 5) madeFlush = true;
      else if (suitCount[s] === 4) flushDraw = true;
    }
  }

  // Straight draw: hero must contribute at least 1 card that's part of the draw
  const unique = [...new Set(allVals)].sort((a,b)=>a-b);
  const boardUnique = new Set(boardVals);
  let oesd = false, gutshot = false;

  function heroContributes(windowVals) {
    return windowVals.some(v => heroVals.includes(v) && !boardUnique.has(v));
  }

  // Check 4-card windows
  for (let i = 0; i <= unique.length - 4; i++) {
    const w = [unique[i], unique[i+1], unique[i+2], unique[i+3]];
    const span = w[3] - w[0];

    // Skip if already a made straight (5 consecutive exist)
    const hasFifth = unique.includes(w[3]+1) || unique.includes(w[0]-1);

    if (span === 3 && !hasFifth && heroContributes(w)) {
      oesd = true; // 4 consecutive, open-ended
    }
    if (span === 4 && heroContributes(w)) {
      gutshot = true; // gap of 1 = gutshot
    }
  }

  // Wheel draw: A-2-3-4 or A-2-3-x-5 etc
  if (unique.includes(14)) {
    const wheelCards = [14,2,3,4,5].filter(v => unique.includes(v));
    if (wheelCards.length === 4 && heroContributes(wheelCards)) {
      if (wheelCards.includes(5) && wheelCards.includes(4) && wheelCards.includes(3) && wheelCards.includes(2)) oesd = true;
      else gutshot = true;
    }
  }

  return { flushDraw, madeFlush, oesd, gutshot, hasDraws: flushDraw || oesd || gutshot };
}

// Alias for compatibility with evaluateHandStrength
const analyzeDraws = detectDraws;

// ============================================================
// ENHANCED POST-FLOP GTO STRATEGY
// ============================================================

function calculatePostflopGTO(equity, potSize, stackDepth, facingAction, position) {
  const betSizeMap = {'chk':0,'c133':0.33,'c12':0.50,'c23':0.67,'pot':1.0,'over':1.5,'vsai':Infinity};
  const betFraction = betSizeMap[facingAction] || 0.5;
  const potOdds = betFraction === Infinity ? 0.50 : betFraction / (1 + 2 * betFraction);

  const draws = detectDraws(state.heroCards, state.boardCards);
  const boardTex = analyzeBoard(state.boardCards);
  const isIP = ['BTN','CO'].includes(position);
  const street = state.street;

  let impliedOddsBonus = 0;
  if (draws.flushDraw) impliedOddsBonus += street==='flop'?8:4;
  if (draws.oesd) impliedOddsBonus += street==='flop'?6:3;
  if (draws.gutshot) impliedOddsBonus += street==='flop'?3:1;

  const effectiveEquity = equity + impliedOddsBonus;
  const requiredEquity = potOdds * 100;

  let foldPct, callPct, raisePct, bestAction, betSize = null;

  if (facingAction === 'chk') {
    const posBonus = isIP ? 8 : 0;
    if (effectiveEquity >= 68+posBonus) { foldPct=0;callPct=5;raisePct=95;bestAction='raise';betSize=boardTex.wetness>0.5?'2/3 pot':'1/3 pot'; }
    else if (effectiveEquity >= 55+posBonus) { foldPct=0;callPct=25;raisePct=75;bestAction='raise';betSize='1/3 pot'; }
    else if (effectiveEquity >= 42) { foldPct=5;callPct=55;raisePct=40;bestAction='mix';betSize='1/3 pot'; }
    else if (effectiveEquity >= 30) { foldPct=15;callPct=72;raisePct=13;bestAction='check'; }
    else if (draws.hasDraws && effectiveEquity>=20) { foldPct=10;callPct=50;raisePct=40;bestAction='mix';betSize='2/3 pot'; }
    else { foldPct=55;callPct=42;raisePct=3;bestAction='check'; }
  } else if (facingAction === 'vsai') {
    if (effectiveEquity >= requiredEquity+10) { foldPct=0;callPct=100;raisePct=0;bestAction='call'; }
    else if (effectiveEquity >= requiredEquity) { foldPct=15;callPct=85;raisePct=0;bestAction='call'; }
    else { foldPct=100;callPct=0;raisePct=0;bestAction='fold'; }
  } else {
    const surplus = effectiveEquity - requiredEquity;
    if (surplus>=25) { foldPct=0;callPct=8;raisePct=92;bestAction='raise';betSize=stackDepth<40?'All-in':'pot'; }
    else if (surplus>=15) { foldPct=0;callPct=30;raisePct=70;bestAction='raise';betSize='2/3 pot'; }
    else if (surplus>=5) { foldPct=0;callPct=65;raisePct=35;bestAction='call'; }
    else if (surplus>=-5) { foldPct=12;callPct=78;raisePct=10;bestAction='call'; }
    else if (surplus>=-15&&draws.hasDraws) { foldPct=25;callPct=60;raisePct=15;bestAction='call'; }
    else if (surplus>=-15) { foldPct=45;callPct=50;raisePct=5;bestAction='fold'; }
    else { foldPct=85;callPct=13;raisePct=2;bestAction='fold'; }
    if (isIP && bestAction==='call') raisePct += 5;
    if (!isIP && bestAction==='raise') { raisePct-=8; callPct+=8; }
  }

  if (stackDepth < 25) { raisePct=Math.max(0,Math.round(raisePct*0.5)); callPct=Math.min(100,callPct+10); if(!betSize)betSize='All-in'; }

  const total = foldPct+callPct+raisePct;
  if (total>0 && total!==100) { foldPct=Math.round(foldPct/total*100); callPct=Math.round(callPct/total*100); raisePct=100-foldPct-callPct; }

  const callEV = (equity/100-0.5)*potSize*(1+betFraction)*2;
  const raiseEV = callEV*1.5+(1-equity/100)*potSize*0.3;
  const weightedEV = (callEV*callPct+raiseEV*raisePct)/Math.max(1,callPct+raisePct);

  return { fold:foldPct, call:callPct, raise:raisePct, bestAction, ev:Math.round(weightedEV*100)/100,
    equity, potOdds, betSize, confidence:equity>=55?'high':(equity>=35?'medium':'low'),
    draws, boardTexture:boardTex, impliedOddsBonus };
}

function classifyHand(c1, c2) {
  const r1=RANKS.indexOf(c1[0]),r2=RANKS.indexOf(c2[0]);
  const suited=c1[1]===c2[1], isPair=r1===r2, gap=Math.abs(r1-r2);
  if (isPair) return `${c1[0]}${c2[0]} Pair`;
  if (r1===0||r2===0) { if(suited&&gap<=2)return `Suited ${c1[0]+c2[0]}`;if(suited)return `Ace-${RANKS[Math.max(r1,r2)]} Suited`;return `Ace-${RANKS[Math.max(r1,r2)]} Offsuit`; }
  if (suited&&gap<=1) return `SC ${c1[0]}${c2[0]}`;
  if (suited) return `Suited ${c1[0]}${c2[0]}`;
  if (gap<=1) return `Connected ${c1[0]}${c2[0]}`;
  return `Offsuit ${c1[0]}${c2[0]}`;
}

/** Main calculation dispatcher */
function runCalculation() {
  const handKey = cardsToHandKey(state.heroCards[0], state.heroCards[1]);
  const street = state.street;
  const pos = state.position;
  const facing = state.facingAction;
  const stack = state.stackDepth;
  const pot = state.potSize;
  const oppCount = state.opponentCount;

  if (street === 'preflop') {
    // Use MCCFR solver for complex preflop spots, lookup for simple RFI
    const isComplexSpot = ['vs3bet', 'vs4bet', 'vsai'].includes(facing);
    
    if (isComplexSpot && mccfrSolver) {
      // Run MCCFR for complex spots
      const mccfrResult = runMCCFRSolve(state, { iterations: 1500 });
      const lookupResult = calculatePreflopGTO(handKey, pos, facing);
      
      // Blend MCCFR with lookup table
      return {
        ...mccfrResult,
        handKey,
        handType: classifyHand(state.heroCards[0], state.heroCards[1]),
        isRFI: isRFIAction(facing),
        ev: lookupResult.ev,
        solverType: 'MCCFR+Lookup'
      };
    }
    
    return calculatePreflopGTO(handKey, pos, facing);
  } else {
    // Postflop: ZERO Monte Carlo simulation - instant calculation
    // Use hand strength evaluation + mathematical equity estimation
    const equity = estimateEquityFast(state.heroCards, state.boardCards);
    const postflopResult = calculatePostflopGTO(equity, pot, stack, facing, pos);
    return {
      ...postflopResult,
      handKey,
      handType: classifyHand(state.heroCards[0], state.heroCards[1]),
      equity,
      street,
      boardTexture: analyzeBoard(state.boardCards),
      solverType: 'Instant GTO'
    };
  }
}

      `在 ${state.position} 位置首入底池(RFI)${result.stackLabel || ''}，<strong>${result.bestAction==='raise'?'OPEN RAISE':'FOLD'}</strong> 是 GTO 最优策略。
       ${result.raise >= 80 ? '<br>&bull; 强势手牌，属于标准开池范围，应果断加注。':''}
       ${result.fold >= 60 ? '<br>&bull; 不在该位置的 GTO 开池范围内，应弃牌。':''}
       ${result.raise > 0 && result.raise < 80 ? '<br>&bull; 边缘手牌，在该位置有一定开池频率（混合策略）。':''}
       ${state.stackDepth <= 25 ? '<br>&bull; <strong>短筹码模式</strong>：采用 Push/Fold 策略，边缘手牌全部弃牌。':''}
       ${state.stackDepth > 120 ? '<br>&bull; <strong>深筹码模式</strong>：投机牌（小对子、同花连张）价值提升，可放宽开池范围。':''}` :
      `<strong>${result.bestAction.toUpperCase()}</strong> 是这手牌在当前位置面对当前行动时的 GTO 最优策略。
       ${result.fold > 60 ? '<br>&bull; 这手牌在此场景下偏弱，GTO 建议主要弃牌。':''}
       ${result.raise > 60 ? '<br>&bull; 强势手牌，GTO 支持积极加注获取价值。':''}
       ${result.call > 60 ? '<br>&bull; 中等强度，跟注保持底池控制。':''}`
    }
    <br><small class="text-slate-500 mt-2 block">基于标准 6-max ${state.stackDepth}BB${result.confidence==='high'?' | GTO 查表命中':' | 智能估算'} | ${state.stackDepth <= 25 ? 'Push/Fold 模式' : (state.stackDepth > 120 ? '深筹码模式' : '标准模式')}</small>
  </div>`;
}

function renderPostflopDetails(result) {
  const bt = result.boardTexture || {};
  const draws = result.draws || {};
  const potOddsPct = ((result.potOdds||0)*100).toFixed(0);
  const betSizeHtml = result.betSize ? `<span class="result-badge badge-green">推荐尺度: ${result.betSize}</span>` : '';
  const drawTags = [];
  if (draws.madeFlush) drawTags.push('<span style="color:#818CF8">已成花</span>');
  else if (draws.flushDraw) drawTags.push('<span style="color:#818CF8">花听牌</span>');
  if (draws.oesd) drawTags.push('<span style="color:#818CF8">OESD</span>');
  if (draws.gutshot) drawTags.push('<span style="color:#818CF8">卡顺</span>');

  return `
  <div class="ev-chart-area">
    <div class="flex items-center justify-between mb-3">
      <div class="section-label mb-0">权益与 EV 分析</div>
      ${betSizeHtml}
    </div>
    <div class="flex items-center justify-between mb-3 text-xs flex-wrap gap-2">
      <span class="text-slate-400">权益: <strong class="text-white font-mono">${result.equity}%</strong></span>
      <span class="text-slate-400">底池赔率: <strong class="text-white font-mono">${potOddsPct}%</strong></span>
      <span class="text-slate-400">板面: <strong>${bt.type||'—'}</strong> ${bt.monotone?'(单花)':''}</span>
      ${drawTags.length ? '<span class="text-slate-400">听牌: '+drawTags.join(' ')+'</span>' : ''}
    </div>
    <div class="ev-bars">
      ${renderEvBar('Fold', 0, '#EF4444')}
      ${renderEvBar('Call', result.ev * (result.call/Math.max(1,result.call+result.raise)), '#F59E0B')}
      ${renderEvBar('Raise', result.ev * (result.raise/Math.max(1,result.call+result.raise)), '#10B981')}
    </div>
  </div>

  <div class="explain-box">
    <span class="tip-tag">翻后分析</span>
    你的<strong>权益约 ${result.equity}%</strong>（即时评估），底池赔率要求 ${potOddsPct}%。
    ${result.equity >= (result.potOdds||0) * 100 ?
      '<br>&bull; <strong style="color:#34D399">权益 &gt; 底池赔率要求，跟注有正 EV。</strong>' :
      '<br>&bull; <strong style="color:#F87171">权益不足，需要隐含赔率支撑或弃牌。</strong>'
    }
    ${result.impliedOddsBonus > 0 ? '<br>&bull; 听牌隐含赔率加成 +' + result.impliedOddsBonus + '%，改善了有效权益。':''}
    ${bt.paired ? '<br>&bull; 公共牌面有对子，需警惕葫芦和三条。':''}
    ${bt.wetness > 0.5 ? '<br>&bull; 湿润板面（花/顺可能性高），边缘成牌需谨慎。':''}
    ${bt.type === 'dry' ? '<br>&bull; 干燥板面，成牌价值更高，可适当激进。':''}
    ${result.betSize ? '<br>&bull; 推荐下注尺度: <strong>'+result.betSize+'</strong>':''}
    <br><small class="text-slate-500 mt-2 block">即时手牌评估 + GTO 策略 | ${['BTN','CO'].includes(state.position)?'位置内(IP)':'位置外(OOP)'} | Heads-up</small>
  </div>`;
}

function renderEvBar(label, val, color) {
  const absVal = Math.abs(val);
  const height = Math.max(4, Math.min(120, absVal * 20));
  const displayVal = val.toFixed(2);
  const sign = val >= 0 ? '' : '-';
  return `
  <div class="ev-bar-wrap">
    <div class="ev-bar-val text-[10px]" style="color:${color}">${sign}${displayVal}</div>
    <div class="ev-bar" style="height:${height}px;background:linear-gradient(180deg,${color},${color}dd);"></div>
    <div class="ev-bar-name">${label}</div>
  </div>`;
}

}

function renderHeroHandDisplay() {
  const c1 = state.heroCards[0], c2 = state.heroCards[1];
  const color1 = SUIT_COLORS[c1[1]], color2 = SUIT_COLORS[c2[1]];
  return `<span class="inline-flex gap-1 font-mono text-base font-bold">
    <span style="color:${color1}">${c1[0]}</span><span style="color:${color1}">${SUIT_SYMBOLS[c1[1]]}</span>
    <span style="color:${color2}">${c2[0]}</span><span style="color:${color2}">${SUIT_SYMBOLS[c2[1]]}</span>
  </span>`;
}

function renderHeatmapMatrix(){
  const tableName = getFacingTable(state.facingAction || "open");
  const gtoTable = PREFLOP_GTO_TABLE[tableName] || PREFLOP_GTO_TABLE["btn_open"];
  let html = `<div class="hand-matrix-wrap"><div class="section-label mb-2">\u624B\u724C\u77E9\u9635\u70ED\u529B\u56FE</div><div class="matrix-grid">`;
  for (let i = 0; i < 13; i++) {
    for (let j = 0; j < 13; j++) {
      const r1 = RANKS[i], r2 = RANKS[j];
      let label, hk;
      if (i === j) { label = r1 + r2; hk = label; }
      else if (i < j) { label = r1 + r2 + "s"; hk = label; }
      else { label = r2 + r1 + "o"; hk = label; }
      const entry = gtoTable[hk];
      const raiseF = entry ? (entry.r || 0) : 0;
      const isCurrent = (state.heroCards.length === 2 &&
        ((RANKS.indexOf(state.heroCards[0][0]) === i && RANKS.indexOf(state.heroCards[1][0]) === j) ||
         (RANKS.indexOf(state.heroCards[0][0]) === j && RANKS.indexOf(state.heroCards[1][0]) === i)));
      let bgColor;
      if (isCurrent) bgColor = "#00D4A4";
      else if (raiseF >= 0.9) bgColor = "#166534";
      else if (raiseF >= 0.7) bgColor = "#15803d";
      else if (raiseF >= 0.5) bgColor = "#a16207";
      else if (raiseF >= 0.3) bgColor = "#92400e";
      else if (raiseF >= 0.1) bgColor = "#7f1d1d";
      else if (raiseF > 0) bgColor = "#450a0a";
      else bgColor = i===j ? "#252838" : (i<j ? "#1e2138" : "#181b29");
      const textColor = isCurrent ? "#0F1117" : (raiseF > 0.3 ? "#e2e8f0" : "#64748B");
      const displayLabel = i===j ? label : (i<j ? r1+r2 : r2+r1);
      html += `<div class="matrix-cell ${i===j?"pair":""}" style="background:${bgColor};color:${textColor}" title="${hk}: ${Math.round(raiseF*100)}% raise">${displayLabel}</div>`;
    }
  }
  html += `</div>
  <div class="matrix-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#00D4A4"></div> \u5F53\u524D</div>
    <div class="legend-item"><div class="legend-dot" style="background:#166534"></div> 90%+</div>
    <div class="legend-item"><div class="legend-dot" style="background:#15803d"></div> 70%+</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a16207"></div> 50%+</div>
    <div class="legend-item"><div class="legend-dot" style="background:#92400e"></div> 30%+</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7f1d1d"></div> 10%+</div>
  </div></div>`;
  return html;
}

function getHeatmapStrength(hk){
  var t=PREFLOP_GTO_TABLE.btn_open[hk];
  if(t) return (t.r||0)*(t.r||0)*0.8+(t.c||0)*0.15+0.05;
  var e=estimateHandFromNeighbors(hk,PREFLOP_GTO_TABLE.btn_open);
  return (e.r||0)*0.7+(e.c||0)*0.2+0.1;
}

// PWA SERVICE WORKER REGISTRATION - Enhanced Caching
// ============================================================
(function registerServiceWorker() {
  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE_NAME = 'dpoker-gto-v2';
      const STATIC_ASSETS = [
        '/',
        '/index.html'
      ];
      
      // Critical CDN resources to cache
      const CDN_RESOURCES = [
        'https://cdn.tailwindcss.com',
        'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap',
        'https://fonts.gstatic.com/s/spacegrotesk/v16/V8mQoQDjQSkFtoMM3T6r8E7mF71Q-gOoraIAEj7oUXskPMBBSSJLm2E.woff2',
        'https://fonts.gstatic.com/s/jetbrainsmono/v18/tDbY2o-flEEny0FZhsfKu5WU4zr3E_BX0PnT8RD8yKxjPVmUsaaDhw.woff2'
      ];
      
      self.addEventListener('install', event => {
        event.waitUntil(
          caches.open(CACHE_NAME).then(cache => {
            // Cache static assets
            const staticCache = cache.addAll(STATIC_ASSETS);
            
            // Try to cache CDN resources (may fail due to CORS, that's ok)
            const cdnCache = Promise.allSettled(
              CDN_RESOURCES.map(url => 
                fetch(url, { mode: 'no-cors' })
                  .then(response => cache.put(url, response))
                  .catch(() => console.log('[SW] Failed to cache:', url))
              )
            );
            
            return Promise.all([staticCache, cdnCache]);
          })
        );
        self.skipWaiting();
      });
      
      self.addEventListener('activate', event => {
        event.waitUntil(
          caches.keys().then(cacheNames => {
            return Promise.all(
              cacheNames
                .filter(name => name !== CACHE_NAME)
                .map(name => caches.delete(name))
            );
          })
        );
        self.clients.claim();
      });
      
      self.addEventListener('fetch', event => {
        const url = event.request.url;
        
        // Strategy 1: CDN resources - Cache First, then Network
        if (url.includes('cdn.tailwindcss.com') || 
            url.includes('fonts.googleapis.com') ||
            url.includes('fonts.gstatic.com')) {
          event.respondWith(
            caches.match(event.request).then(cached => {
              // Return cached version immediately if available
              if (cached) {
                // Still try to update cache in background
                fetch(event.request).then(response => {
                  caches.open(CACHE_NAME).then(cache => {
                    cache.put(event.request, response.clone());
                  });
                }).catch(() => {});
                return cached;
              }
              
              // Otherwise fetch and cache
              return fetch(event.request).then(response => {
                const responseClone = response.clone();
                caches.open(CACHE_NAME).then(cache => {
                  cache.put(event.request, responseClone);
                });
                return response;
              });
            }).catch(() => {
              // If both fail, return a fallback or error
              return new Response('Offline - Resource unavailable', { status: 503 });
            })
          );
          return;
        }
        
        // Strategy 2: Static assets - Cache First
        if (event.request.mode === 'navigate' || 
            url.endsWith('.html') || 
            url.endsWith('.js') || 
            url.endsWith('.css')) {
          event.respondWith(
            caches.match(event.request).then(response => {
              return response || fetch(event.request).then(fetchResponse => {
                return caches.open(CACHE_NAME).then(cache => {
                  cache.put(event.request, fetchResponse.clone());
                  return fetchResponse;
                });
              });
            }).catch(() => caches.match('/'))
          );
          return;
        }
        
        // Strategy 3: Everything else - Network First, then Cache
        event.respondWith(
          fetch(event.request).then(response => {
            const responseClone = response.clone();
            caches.open(CACHE_NAME).then(cache => {
              cache.put(event.request, responseClone);
            });
            return response;
          }).catch(() => caches.match(event.request))
        );
      });
    `;
    
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    
    navigator.serviceWorker.register(swUrl)
      .then(registration => {
        console.log('[DPoker] Service Worker registered:', registration.scope);
      })
      .catch(error => {
        console.warn('[DPoker] Service Worker registration failed:', error);
      });
  }
})();

      this.isOnline = true;

    window.addEventListener('offline', () => {
      this.isOnline = false;
      showToast('进入离线模式，计算功能仍可用');

};
